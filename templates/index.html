{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="hud-shell">
    <header class="hud-header">
        <div class="header-left">
            <span class="glitch-text" data-text="CORE_v4.0.2">CORE_v4.0.2</span>
            <span class="status-indicator">● SYSTEM_ACTIVE</span>
        </div>
        <div class="header-right">
            <span id="timestamp"></span>
        </div>
    </header>

    <section class="input-unit">
        <form method="POST" id="core-form">
            <div class="input-wrapper">
                <span class="input-prefix">>>></span>
                <input 
                    type="text" 
                    name="equation" 
                    id="inputBox" 
                    placeholder="ENTER_MATHEMATICAL_SEQUENCE..." 
                    autocomplete="off" 
                    value="{{ request.form.get('equation', '') }}"
                    required
                >
                <button type="submit" class="btn-execute">EXECUTE</button>
            </div>
        </form>
    </section>

    <div class="main-display-grid">
        <div class="display-panel data-stream">
            <h3 class="panel-label">PROCESS_LOG_STREAM</h3>
            <div id="steps-container">
                </div>

            {% if solution %}
            <div id="final-result-box" class="result-highlight" style="display: none;">
                <span class="label">COORDINATES_RESOLVED</span>
                <div class="solution-text">{{ solution | safe }}</div>
            </div>
            {% endif %}
        </div>

        <div class="display-panel viz-projection">
            <h3 class="panel-label">GEOMETRIC_PROJECTION</h3>
            <div id="viz-container">
                {% if graph %}
                    {{ graph | safe }}
                {% else %}
                    <div class="no-data-msg">[ SEARCHING_FOR_SIGNAL... ]</div>
                {% endif %}
            </div>
            </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Digital Clock for the HUD
        function updateTime() {
            const now = new Date();
            document.getElementById('timestamp').innerText = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. Step Animation Sequence
        // We wrap the Jinja variable in quotes and parse it to avoid VS Code red errors
        const rawSteps = '{{ steps|tojson|safe if steps else "[]" }}';
        let stepsData = [];
        
        try {
            stepsData = JSON.parse(rawSteps);
        } catch (e) {
            console.warn("CORE: No active process sequence detected.");
        }

        if (stepsData.length > 0) {
            let i = 0;
            const container = document.getElementById("steps-container");
            const finalBox = document.getElementById("final-result-box");

    // ... inside your DOMContentLoaded listener
         if (stepsData.length > 0) {
             let stepIndex = 0;
              const container = document.getElementById("steps-container");
             const finalBox = document.getElementById("final-result-box");

           function typeStep() {
        if (stepIndex < stepsData.length) {
            // 1. Create the container for this specific step
            const stepDiv = document.createElement("div");
            stepDiv.className = "step-entry";
            stepDiv.style.opacity = "1"; // Show it immediately
            
            // 2. Add the [OP] tag first (static)
            const opSpan = `<span class="op-code">[${stepsData[stepIndex].op}]</span> `;
            stepDiv.innerHTML = opSpan;
            container.appendChild(stepDiv);

            // 3. Logic to type the message letter-by-letter
            let charIndex = 0;
            const fullMsg = stepsData[stepIndex].msg;
            
            function typeChar() {
                if (charIndex < fullMsg.length) {
                    // Append one character at a time
                    stepDiv.innerHTML += fullMsg.charAt(charIndex);
                    charIndex++;
                    
                    // Speed of individual letters (30ms = fast terminal feel)
                    setTimeout(typeChar, 30); 
                } else {
                    // Once word is done, wait and move to next step
                    stepIndex++;
                    // Delay between different steps (800ms)
                    setTimeout(typeStep, 800); 
                    
                    // Refresh MathJax if the step contained LaTeX
                    if (window.MathJax) MathJax.typesetPromise();
                }
            }
            
            typeChar(); // Start typing the message
        } else if (finalBox) {
            finalBox.style.display = "block";
        }
    }
    
    typeStep(); // Start the sequence
}
        }
    });
</script>
{% endblock %}
