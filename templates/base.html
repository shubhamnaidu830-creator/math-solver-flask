<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <title>MathLab | {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>  
    <style>
        :root { --apple-blue: #0A84FF; --glass: rgba(0, 0, 0, 0.45); --border: rgba(255,255,255,0.15); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; color: white; min-height: 100vh; overflow-x: hidden; }
        
        #parallax-bg {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover;
            z-index: -2; transition: transform 0.1s ease-out, filter 0.8s ease;
            filter: blur(8px) brightness(0.8);
        }

        .navbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 900px; height: 60px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 100;
        }

        .nav-links a { color: rgba(255,255,255,0.5); text-decoration: none; margin-left: 20px; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: white; }
        
        .container { padding-top: 120px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* Shared Glass Card Style */
        .card {
            background: var(--glass); backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border); border-radius: 28px; padding: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="parallax-bg"></div>
   <nav class="navbar">
    <a href="/" style="color:white; font-weight:700; text-decoration:none;">MathLab</a>
    <div class="nav-links">
        <a href="/">Solver</a>
        <a href="/numerical">Library</a>
    </div>
</nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.getElementById('parallax-bg').style.transform = `translate(${-moveX}px, ${-moveY}px)`;
        });
    </script>
</body>
</html>
