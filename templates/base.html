<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <title>MathLab | {% block title %}{% endblock %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- MathJax -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>  

    <style>
        :root {
            --apple-blue: #0A84FF;
            --glass: rgba(0, 0, 0, 0.5);
            --border: rgba(255,255,255,0.12);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background /
        #parallax-bg {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover;
            z-index: -2;
            transition: transform 0.1s ease-out;
            filter: blur(10px) brightness(0.7);
        }

        / Navbar /
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 900px;
            height: 60px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 100;
        }

        .nav-links a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: white;
        }

        / Container /
        .container {
            padding-top: 120px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        / Glass Card /
        .card {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        / Input /
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 15px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }

        / Button /
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 20px;
            background: var(--apple-blue);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #0066cc;
        }

        / Subtext /
        .subtext {
            margin-top: 15px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        / Result Box /
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.08);
            text-align: left;
        }

        / Tables /
        table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        / Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

    <div id="parallax-bg"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" style="color:white; font-weight:700; text-decoration:none;">MathLab</a>
        <div class="nav-links">
            <a href="/">Solver</a>
            <a href="/numerical">Library</a>
        </div>
    </nav>

    <!-- Content -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Parallax Script -->
    <script>
        document.addEventListener('mousemove', function(e) {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;

            document.getElementById('parallax-bg').style.transform =
                "translate(" + (-moveX) + "px, " + (-moveY) + "px)";
        });
    </script>

</body>
</html>
